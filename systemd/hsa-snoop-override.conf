# systemd drop-in override for hsa-snoop.service
# Install to: /etc/systemd/system/hsa-snoop.service.d/override.conf
#
# This override reads /etc/hsa-snoop.conf and appends HSA_SNOOP_ARGS to
# the ExecStart command, allowing runtime configuration without editing
# the unit file directly.

[Service]
EnvironmentFile=-/etc/hsa-snoop.conf
ExecStart=
ExecStart=/usr/local/bin/hsa-snoop --all $HSA_SNOOP_ARGS
