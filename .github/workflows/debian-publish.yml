name: debian-publish

on:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]*.[0-9]*.[0-9]*'

permissions:
  contents: write

jobs:
  publish-deb:
    name: Publish Debian package to GitHub Releases
    runs-on: ubuntu-latest
    container:
      image: rocm/dev-ubuntu-24.04:7.2
      options: --user root
    env:
      LD_LIBRARY_PATH: /opt/rocm/lib:/usr/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH
      GH_TOKEN: ${{ github.token }}

    steps:
    - name: Install git and gh
      run: |
        apt-get update
        apt-get install -y git gh

    - name: Check out code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Mark repo as safe for git
      run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

    - name: Install build dependencies
      run: apt-get install -y cmake dpkg-dev

    - name: Determine version
      id: version
      shell: bash
      run: |
        # Use the git tag if this run was triggered by one, otherwise fall back
        # to the short commit SHA prefixed with 0~ (pre-release ordering).
        TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
        if [[ -n "$TAG" ]]; then
          VERSION="${TAG#v}"        # strip leading 'v'
          PRERELEASE=false
        else
          VERSION="0~${GITHUB_SHA::8}"
          PRERELEASE=true
        fi
        echo "VERSION=${VERSION}"    >> "$GITHUB_ENV"
        echo "PRERELEASE=${PRERELEASE}" >> "$GITHUB_ENV"
        echo "TAG=${TAG}"            >> "$GITHUB_ENV"

    - name: Configure with CMake (Prometheus enabled)
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DGPU_TARGETS=gfx942 \
          -DHSA_SNOOP_PROMETHEUS=ON

    - name: Build
      run: cmake --build build --parallel $(nproc)

    - name: Install into staging tree
      run: cmake --install build --prefix /tmp/pkg/usr/local

    - name: Assemble .deb
      shell: bash
      run: |
        mkdir -p /tmp/pkg/DEBIAN
        cp debian/control debian/postinst debian/prerm debian/conffiles /tmp/pkg/DEBIAN/
        chmod 0755 /tmp/pkg/DEBIAN/postinst /tmp/pkg/DEBIAN/prerm
        sed -i "s/^Version:.*/Version: ${VERSION}/" /tmp/pkg/DEBIAN/control
        DEB_FILE="hsa-snoop_${VERSION}_amd64.deb"
        dpkg-deb --build --root-owner-group /tmp/pkg "${DEB_FILE}"
        echo "DEB_FILE=${DEB_FILE}" >> "$GITHUB_ENV"

    - name: Verify .deb metadata
      run: dpkg-deb --info "$DEB_FILE"

    - name: Publish to GitHub Releases
      shell: bash
      run: |
        if [[ "${PRERELEASE}" == "false" ]]; then
          # Named semver release — create once, do not overwrite
          gh release create "${TAG}" \
            --title "hsa-snoop ${TAG}" \
            --notes "Release ${TAG}." \
            "${DEB_FILE}"
        else
          # Rolling latest pre-release for every main push
          gh release delete latest --yes || true
          gh release create latest \
            --title "Latest build (${VERSION})" \
            --notes "Automatically published from main at commit ${GITHUB_SHA}." \
            --prerelease \
            "${DEB_FILE}"
        fi
