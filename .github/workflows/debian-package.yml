name: debian-package

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - '**.cpp'
      - '**.h'
      - '**.hip'
      - 'CMakeLists.txt'
      - 'src/**'
      - 'systemd/**'
      - 'debian/**'
      - 'grafana/**'
      - '.github/workflows/debian-package.yml'

jobs:
  build-deb:
    name: Build Debian package (Prometheus)
    runs-on: ubuntu-latest
    container:
      image: rocm/dev-ubuntu-24.04:7.2
      options: --user root
    env:
      LD_LIBRARY_PATH: /opt/rocm/lib:/usr/lib/x86_64-linux-gnu:$LD_LIBRARY_PATH

    steps:
    - name: Install git
      run: |
        apt-get update
        apt-get install -y git

    - name: Check out code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Mark repo as safe for git
      run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

    - name: Install dependencies
      run: apt-get install -y cmake dpkg-dev bpftrace

    - name: Determine version
      id: version
      shell: bash
      run: |
        TAG=$(git tag --points-at HEAD | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+' | head -1 || true)
        if [[ -n "$TAG" ]]; then
          VERSION="${TAG#v}"
        else
          VERSION="0~${GITHUB_SHA::8}"
        fi
        echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

    - name: Configure with CMake (Prometheus enabled)
      run: |
        cmake -B build \
          -DCMAKE_BUILD_TYPE=Release \
          -DGPU_TARGETS=gfx942 \
          -DHSA_SNOOP_PROMETHEUS=ON

    - name: Build
      run: cmake --build build --parallel $(nproc)

    - name: Install into staging tree
      run: cmake --install build --prefix /tmp/pkg/usr/local

    - name: Assemble .deb
      shell: bash
      run: |
        mkdir -p /tmp/pkg/DEBIAN
        cp debian/control debian/postinst debian/prerm debian/conffiles /tmp/pkg/DEBIAN/
        chmod 0755 /tmp/pkg/DEBIAN/postinst /tmp/pkg/DEBIAN/prerm
        sed -i "s/^Version:.*/Version: ${VERSION}/" /tmp/pkg/DEBIAN/control
        DEB_FILE="hsa-snoop_${VERSION}_amd64.deb"
        dpkg-deb --build --root-owner-group /tmp/pkg "${DEB_FILE}"
        echo "DEB_FILE=${DEB_FILE}" >> "$GITHUB_ENV"

    - name: Verify .deb metadata
      run: dpkg-deb --info "$DEB_FILE"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: hsa-snoop-deb
        path: hsa-snoop_*_amd64.deb
        retention-days: 7
